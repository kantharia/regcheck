name: RegRadar Weekly Crawl

on:
  schedule:
    - cron: "30 1 * * 3"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run crawler
        run: node scripts/crawl.js
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit changes back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: weekly crawl update [skip ci]"
          file_pattern: "data/seen.json docs/index.html docs/feed.xml"
